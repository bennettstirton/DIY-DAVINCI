<svg width="1060" height="650" viewBox="0 0 1060 650" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <defs>
    <pattern id="holes" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1.8" fill="#888"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1060" height="650" fill="#0d1117"/>
  <text x="20" y="20" fill="#e6edf3" font-size="14" font-weight="bold">Arm Controller ESP32 — Perfboard Placement (armcontrol.py / config.py)</text>
  <text x="20" y="36" fill="#8b949e" font-size="11">DOIT DevKit V1, 30-pin — verify your board's pin order/spacing. Coordinates match esp32_arm_perfboard_layout.md.</text>

  <!-- perfboard hole field -->
  <rect x="98" y="50" width="792" height="528" fill="#142028" stroke="#30363d"/>
  <rect x="98" y="50" width="792" height="528" fill="url(#holes)"/>

  <!-- rails -->
  <line x1="110" y1="60" x2="880" y2="60" stroke="#f85149" stroke-width="3"/>
  <text x="888" y="64" fill="#f85149" font-size="11">3.3V RAIL (row A)</text>
  <line x1="110" y1="566" x2="880" y2="566" stroke="#58a6ff" stroke-width="3"/>
  <text x="888" y="570" fill="#58a6ff" font-size="11">GND RAIL (row X)</text>

  <!-- ESP32 body -->
  <rect x="298" y="116" width="218" height="328" fill="#21262d" stroke="#e6edf3" stroke-width="1.5"/>
  <text x="407" y="280" fill="#e6edf3" font-size="13" text-anchor="middle">ESP32</text>
  <text x="407" y="296" fill="#8b949e" font-size="10" text-anchor="middle">DOIT DevKit V1</text>
  <circle cx="306" cy="124" r="4" fill="none" stroke="#e6edf3"/>

  <!-- ESP32 left pins (col 10, x=308) -->
  <g fill="#ffd33d">
    <circle cx="308" cy="126" r="3"/><circle cx="308" cy="148" r="3"/><circle cx="308" cy="170" r="3"/>
    <circle cx="308" cy="192" r="3"/><circle cx="308" cy="214" r="3"/><circle cx="308" cy="236" r="3"/>
    <circle cx="308" cy="258" r="3"/><circle cx="308" cy="280" r="3"/><circle cx="308" cy="302" r="3"/>
    <circle cx="308" cy="324" r="3"/><circle cx="308" cy="346" r="3"/><circle cx="308" cy="368" r="3"/>
    <circle cx="308" cy="390" r="3"/><circle cx="308" cy="412" r="3"/><circle cx="308" cy="434" r="3"/>
  </g>
  <g fill="#ffd33d" font-size="9" text-anchor="end">
    <text x="296" y="130">3V3</text><text x="296" y="152">EN</text><text x="296" y="174">36</text>
    <text x="296" y="196">39</text><text x="296" y="218">34</text><text x="296" y="240">35</text>
    <text x="296" y="262">32</text><text x="296" y="284">33</text><text x="296" y="306">25</text>
    <text x="296" y="328">26</text><text x="296" y="350">27</text><text x="296" y="372">14</text>
    <text x="296" y="394">12</text><text x="296" y="416">13</text><text x="296" y="438">GND</text>
  </g>

  <!-- ESP32 right pins (col 19, x=506) -->
  <g fill="#79c0ff">
    <circle cx="506" cy="126" r="3"/><circle cx="506" cy="148" r="3"/><circle cx="506" cy="170" r="3"/>
    <circle cx="506" cy="192" r="3"/><circle cx="506" cy="214" r="3"/><circle cx="506" cy="236" r="3"/>
    <circle cx="506" cy="258" r="3"/><circle cx="506" cy="280" r="3"/><circle cx="506" cy="302" r="3"/>
    <circle cx="506" cy="324" r="3"/><circle cx="506" cy="346" r="3"/><circle cx="506" cy="368" r="3"/>
    <circle cx="506" cy="390" r="3"/><circle cx="506" cy="412" r="3"/><circle cx="506" cy="434" r="3"/>
  </g>
  <g fill="#79c0ff" font-size="9">
    <text x="518" y="130">VIN</text><text x="518" y="152">23</text><text x="518" y="174">22</text>
    <text x="518" y="196">1/TX0</text><text x="518" y="218">3/RX0</text><text x="518" y="240">21</text>
    <text x="518" y="262">19</text><text x="518" y="284">18</text><text x="518" y="306">5</text>
    <text x="518" y="328">17</text><text x="518" y="350">16</text><text x="518" y="372">4</text>
    <text x="518" y="394">0</text><text x="518" y="416">2</text><text x="518" y="438">15</text>
  </g>

  <!-- TCA9548A body -->
  <rect x="557" y="466" width="162" height="68" fill="#21262d" stroke="#e6edf3" stroke-width="1.5"/>
  <text x="638" y="488" fill="#e6edf3" font-size="11" text-anchor="middle">TCA9548A mux (0x70)</text>

  <!-- TCA control pins row T (y=478) -->
  <g fill="#d2a8ff">
    <circle cx="572" cy="478" r="3"/><circle cx="594" cy="478" r="3"/><circle cx="616" cy="478" r="3"/>
    <circle cx="638" cy="478" r="3"/><circle cx="660" cy="478" r="3"/><circle cx="682" cy="478" r="3"/>
    <circle cx="704" cy="478" r="3"/>
  </g>
  <g fill="#d2a8ff" font-size="8" text-anchor="middle">
    <text x="572" y="470">VCC</text><text x="594" y="470">GND</text><text x="616" y="470">SDA</text>
    <text x="638" y="470">SCL</text><text x="660" y="470">A0</text><text x="682" y="470">A1</text>
    <text x="704" y="470">A2</text>
  </g>

  <!-- TCA channel pins row V (y=522) -->
  <g fill="#a5d6ff">
    <circle cx="572" cy="522" r="3"/><circle cx="594" cy="522" r="3"/><circle cx="616" cy="522" r="3"/>
    <circle cx="638" cy="522" r="3"/><circle cx="660" cy="522" r="3"/><circle cx="682" cy="522" r="3"/>
  </g>
  <g fill="#a5d6ff" font-size="8" text-anchor="middle">
    <text x="572" y="540">SD0</text><text x="594" y="540">SC0</text><text x="616" y="540">SD1</text>
    <text x="638" y="540">SC1</text><text x="660" y="540">SD2</text><text x="682" y="540">SC2</text>
  </g>

  <!-- power wires -->
  <line x1="308" y1="126" x2="308" y2="60" stroke="#f85149" stroke-width="2"/>
  <line x1="308" y1="434" x2="308" y2="566" stroke="#58a6ff" stroke-width="2"/>
  <line x1="572" y1="478" x2="572" y2="60" stroke="#f85149" stroke-width="1.5"/>
  <line x1="594" y1="478" x2="594" y2="566" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="660" y1="478" x2="660" y2="566" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="682" y1="478" x2="682" y2="566" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="704" y1="478" x2="704" y2="566" stroke="#58a6ff" stroke-width="1.5"/>

  <!-- I2C wires: ESP32 SCL(506,170) -> TCA SCL(638,478), with pull-up branch to rail -->
  <path d="M506,170 L540,170 L540,478 L638,478" fill="none" stroke="#2a9d8f" stroke-width="1.5"/>
  <path d="M496,170 L496,60" fill="none" stroke="#f85149" stroke-width="1.2" stroke-dasharray="1,0"/>
  <rect x="490" y="100" width="12" height="22" fill="#0d1117" stroke="#f85149"/>
  <text x="466" y="115" fill="#f85149" font-size="8">2.2k</text>

  <!-- I2C wires: ESP32 SDA(506,236) -> TCA SDA(616,478), with pull-up branch to rail -->
  <path d="M506,236 L548,236 L548,478 L616,478" fill="none" stroke="#2a9d8f" stroke-width="1.5"/>
  <path d="M516,236 L516,60" fill="none" stroke="#f85149" stroke-width="1.2"/>
  <rect x="510" y="130" width="12" height="22" fill="#0d1117" stroke="#f85149"/>
  <text x="486" y="145" fill="#f85149" font-size="8">2.2k</text>

  <!-- GPIO4 debounce cap to GND -->
  <path d="M506,368 L530,368 L530,566" fill="none" stroke="#ffa657" stroke-width="1.5"/>
  <line x1="522" y1="450" x2="538" y2="450" stroke="#ffd33d" stroke-width="3"/>
  <line x1="522" y1="458" x2="538" y2="458" stroke="#ffd33d" stroke-width="3"/>
  <text x="542" y="458" fill="#ffd33d" font-size="8">100nF</text>

  <!-- left external leads -->
  <g font-size="9" fill="#a5d6ff" text-anchor="end">
    <line x1="60" y1="258" x2="308" y2="258" stroke="#a5d6ff" stroke-dasharray="3,2"/>
    <text x="56" y="262">TRIM X (joystick)</text>
    <line x1="60" y1="280" x2="308" y2="280" stroke="#a5d6ff" stroke-dasharray="3,2"/>
    <text x="56" y="284">TRIM Y (joystick)</text>
    <line x1="60" y1="302" x2="308" y2="302" stroke="#ffa657" stroke-dasharray="3,2"/>
    <text x="56" y="306">ROLL DIR → TB6600</text>
    <line x1="60" y1="324" x2="308" y2="324" stroke="#ffa657" stroke-dasharray="3,2"/>
    <text x="56" y="328">ROLL STEP → e-stop gate</text>
    <line x1="60" y1="346" x2="308" y2="346" stroke="#ffa657" stroke-dasharray="3,2"/>
    <text x="56" y="350">PITCH DIR → DM556T</text>
    <line x1="60" y1="368" x2="308" y2="368" stroke="#ffa657" stroke-dasharray="3,2"/>
    <text x="56" y="372">PITCH STEP → e-stop gate</text>
    <line x1="60" y1="412" x2="308" y2="412" stroke="#ffa657" stroke-dasharray="3,2"/>
    <text x="56" y="416">LINEAR STEP → e-stop gate</text>
  </g>

  <!-- right external leads (above TCA) -->
  <g font-size="9" fill="#d2a8ff">
    <line x1="556" y1="148" x2="900" y2="148" stroke="#d9534f" stroke-dasharray="3,2"/>
    <text x="904" y="152" fill="#d9534f">LINEAR LIMIT (NC) → GND</text>
    <line x1="556" y1="302" x2="900" y2="302" stroke="#d9534f" stroke-dasharray="3,2"/>
    <text x="904" y="306" fill="#d9534f">RE-ARM (NO) → GND, strap</text>
    <line x1="556" y1="324" x2="900" y2="324" stroke="#7b6cd9" stroke-dasharray="3,2"/>
    <text x="904" y="328" fill="#7b6cd9">ENCODER B (÷ if 5V)</text>
    <line x1="556" y1="346" x2="900" y2="346" stroke="#7b6cd9" stroke-dasharray="3,2"/>
    <text x="904" y="350" fill="#7b6cd9">ENCODER A (÷ if 5V)</text>
    <line x1="556" y1="368" x2="900" y2="368" stroke="#d9534f" stroke-dasharray="3,2"/>
    <text x="904" y="372" fill="#d9534f">→ e-stop gate J1, strap</text>
    <line x1="556" y1="434" x2="900" y2="434" stroke="#ffa657" stroke-dasharray="3,2"/>
    <text x="904" y="438" fill="#ffa657">LINEAR DIR → TB6600, strap</text>
  </g>

  <!-- VIN external lead -->
  <line x1="900" y1="126" x2="556" y2="126" stroke="#f85149" stroke-dasharray="3,2"/>
  <text x="904" y="130" fill="#f85149" font-size="9">5V SUPPLY IN</text>

  <!-- onboard-only notes -->
  <text x="556" y="394" fill="#6e7681" font-size="9">BOOT button — onboard, no wiring</text>
  <text x="556" y="416" fill="#6e7681" font-size="9">status LED — onboard, no wiring</text>

  <!-- TCA / remote sensor leads below module -->
  <g font-size="9" fill="#a5d6ff">
    <line x1="572" y1="540" x2="572" y2="588" stroke="#a5d6ff" stroke-dasharray="3,2"/>
    <text x="572" y="600" text-anchor="middle">AS5600 roll (remote)</text>
    <line x1="638" y1="540" x2="638" y2="588" stroke="#a5d6ff" stroke-dasharray="3,2"/>
    <text x="638" y="600" text-anchor="middle">AS5600 pitch (remote)</text>
    <line x1="638" y1="478" x2="780" y2="430" stroke="#2a9d8f" stroke-dasharray="3,2"/>
    <text x="784" y="432" fill="#2a9d8f">MPU6050 IMU — remote,</text>
    <text x="784" y="444" fill="#2a9d8f">parallel tap on SDA/SCL</text>
  </g>
  <g font-size="9" fill="#a5d6ff">
    <line x1="682" y1="540" x2="682" y2="588" stroke="#a5d6ff" stroke-dasharray="3,2"/>
    <text x="682" y="600" text-anchor="middle">AS5600 linear (remote)</text>
  </g>

  <text x="20" y="630" fill="#6e7681" font-size="10">Legend: red=3.3V, blue=GND, teal=I2C, purple=mux ctrl, dashed=off-board lead (not a board trace). Full hole-by-hole table in esp32_arm_perfboard_layout.md</text>
</svg>
